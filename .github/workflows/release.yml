name: Release jrit

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: universal-apple-darwin
            artifact_name: jrit-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: jrit-windows.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: jrit-linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust targets (macOS universal)
        if: matrix.os == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install Rust toolchain
        if: matrix.os != 'macos-latest'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build (macOS universal)
        if: matrix.os == 'macos-latest'
        run: |
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin
          lipo -create \
            -output ${{ matrix.artifact_name }} \
            target/x86_64-apple-darwin/release/jrit \
            target/aarch64-apple-darwin/release/jrit

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cargo build --release
          copy target\release\jrit.exe ${{ matrix.artifact_name }}

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo build --release
          cp target/release/jrit ${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build release body
        id: body
        run: |
          TAG="${{ github.ref_name }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -n1)

          CHANGELOG=$(awk "/^## \[${TAG}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)

          if [ -n "$PREV_TAG" ]; then
            URL="https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
            BODY="${CHANGELOG}"$'\n\n'"Full changelog: ${URL}"
          else
            BODY="${CHANGELOG}"
          fi

          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.body.outputs.body }}
          files: artifacts/**/*